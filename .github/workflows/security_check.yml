name: DART Security Gate

on: [push]

permissions:
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check forbidden files
        id: forbidden
        run: |
          FORBIDDEN=$(find . \
            -not -path './.git/*' \
            \( -iname "*.csv" -o -iname "*.xlsx" -o -name ".env" \
               -o -name ".DS_Store" -o -name "__pycache__" -o -name ".venv" \) )

          if [ -n "$FORBIDDEN" ]; then
            echo "🚨 [보안 위반] 금지된 파일이 감지되었습니다:"
            echo "$FORBIDDEN"
            exit 1
          fi

      - name: Notify - forbidden files
        if: failure() && steps.forbidden.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toLocaleString('ko-KR', {timeZone: 'Asia/Seoul'});
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 2,
              body: `@imjyong 🚨 **[금지된 파일]** 업로드 금지 파일이 감지되었습니다.\n\n발생 시각: ${now}\n로그: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })

      - name: Check file size
        id: filesize
        run: |
          LARGE=$(find . -not -path './.git/*' -type f -size +30M)
          if [ -n "$LARGE" ]; then
            echo "🚨 [용량 초과] 30MB 이상의 파일이 감지되었습니다:"
            while IFS= read -r file; do
              size=$(du -sh "$file" | cut -f1)
              echo "  $file ($size)"
            done <<< "$LARGE"
            exit 1
          fi

      - name: Notify - file size
        if: failure() && steps.filesize.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toLocaleString('ko-KR', {timeZone: 'Asia/Seoul'});
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 2,
              body: `@imjyong 🚨 **[용량 초과]** 30MB 이상의 파일이 감지되었습니다.\n\n발생 시각: ${now}\n로그: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })

      - name: Gitleaks - API key scan
        id: gitleaks
        run: |
          docker run -v ${{ github.workspace }}:/path zricethezav/gitleaks:latest \
            detect --source="/path" --verbose --redact

      - name: Notify - API key
        if: failure() && steps.gitleaks.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toLocaleString('ko-KR', {timeZone: 'Asia/Seoul'});
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 2,
              body: `@imjyong 🚨 **[API 키 유출]** 코드에서 API 키로 의심되는 내용이 감지되었습니다.\n\n발생 시각: ${now}\n로그: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
